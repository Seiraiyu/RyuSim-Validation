name: Benchmarks

on:
  push:
    paths:
      - "rtlmeter_tests/**"
      - "cocotb_tests/**"
      - "run_benchmarks.py"
      - ".github/workflows/benchmarks.yml"
  pull_request:
    paths:
      - "rtlmeter_tests/**"
      - "cocotb_tests/**"
      - "run_benchmarks.py"
      - ".github/workflows/benchmarks.yml"
  workflow_dispatch:
    inputs:
      ryusim_version:
        description: "RyuSim version to install"
        type: string
        default: "latest"

jobs:
  benchmark:
    timeout-minutes: 120
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            os: ubuntu-24.04
          - distro: ubuntu-22.04
            os: ubuntu-22.04
          - distro: debian-12
            os: ubuntu-latest
            container: debian:12
            pip_flags: "--break-system-packages"
          - distro: rocky-9
            os: ubuntu-latest
            container: rockylinux:9
          - distro: fedora-40
            os: ubuntu-latest
            container: fedora:40
            pip_flags: "--break-system-packages"
    steps:
      - name: Install base packages (Debian 12)
        if: matrix.container == 'debian:12'
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv git curl ca-certificates cmake ninja-build clang verilator

      - name: Install base packages (Rocky 9)
        if: matrix.container == 'rockylinux:9'
        run: |
          dnf install -y epel-release
          /usr/bin/crb enable
          dnf install -y python3 python3-pip git ca-certificates cmake ninja-build clang gcc gcc-c++ make verilator

      - name: Install base packages (Fedora 40)
        if: matrix.container == 'fedora:40'
        run: |
          dnf install -y python3 python3-pip git ca-certificates cmake ninja-build clang gcc gcc-c++ make verilator

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (native runners)
        if: ${{ !matrix.container }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RyuSim
        run: bash setup_ryusim.sh
        env:
          RYUSIM_VERSION: ${{ inputs.ryusim_version }}

      - name: Install Python dependencies
        run: pip install ${{ matrix.pip_flags || '' }} -r requirements.txt

      - name: Install system dependencies (native Ubuntu)
        if: ${{ !matrix.container }}
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang verilator

      - name: Run benchmarks
        run: python3 -u run_benchmarks.py --all --verbose --output results/benchmarks-${{ matrix.distro }}.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.distro }}
          path: results/
          retention-days: 30
